<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Ships — VesselFinder</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0b0f17; font-family: Inter, system-ui, sans-serif; color: #e8eef5; overflow: hidden; }
    #vf { width: 100%; height: 100%; }
    .note { position: fixed; left: 12px; bottom: 12px; max-width: 360px; font-size: 11px; line-height: 1.5;
      background: rgba(10,13,20,.86); border: 1px solid rgba(255,255,255,.12); border-radius: 10px; padding: 10px 12px; color: #9fb0c2; }
    .note b { color: #46d8ff; }
  </style>
</head>
<body>
  <div id="vf">
    <!-- VesselFinder live AIS embed (fleet key). Requires your site domain to be
         whitelisted in VesselFinder → Account → Embed / Allowed domains. -->
    <script type="text/javascript">
      var width = "100%";
      var height = "100%";
      var latitude = "26.0";
      var longitude = "54.0";
      var zoom = "6";
      var names = true;
      var fleet = "019ea1bfd99176898c26a60260662cbd";   // "Fleet details" key
      var fleet_hide_old_positions = true;
    </script>
    <script type="text/javascript" src="https://www.vesselfinder.com/aismap.js"></script>
  </div>
  <div class="note">
    <b>VesselFinder Live</b> — uses your fleet key. If the map is blank, open
    VesselFinder → Account and add this site's <b>domain to the allowed/embed list</b>.
    Gulf vessels appear only where ships still broadcast AIS.
  </div>
</body>
</html>
