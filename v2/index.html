<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <!-- never serve a stale cached HTML entry (old ?v JS → old-version flash / style reverts) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Al Jazeera — News Map (v2)</title>
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../lib/leaflet.min.css">
  <link rel="stylesheet" href="lib/maplibre-gl.css">
  <link rel="stylesheet" href="css/tokens.css?v=44">
  <link rel="stylesheet" href="css/app.css?v=44">
  <style>/* boot veil — hides the default→saved style/view swap on load (no FOUC / "old version" flash) */
    #boot{position:fixed;inset:0;background:#0a0e16;z-index:100000;transition:opacity .4s ease}
    #boot.gone{opacity:0;pointer-events:none}</style>
</head>
<body>
  <div id="boot" aria-hidden="true"></div>
  <!-- liquid-glass refraction filter (used by panels via backdrop-filter) -->
  <svg style="position:absolute;width:0;height:0" aria-hidden="true">
    <filter id="glassDistort" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.016" numOctaves="2" seed="11" result="n"/>
      <feGaussianBlur in="n" stdDeviation="0.5" result="nb"/>
      <feDisplacementMap id="glassDisp" in="SourceGraphic" in2="nb" scale="46" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>
  <div id="map"></div>

  <script src="../lib/leaflet.min.js"></script>
  <script src="lib/maplibre-gl.min.js"></script>
  <script src="js/icons.js?v=44"></script>
  <script src="js/help.js?v=44"></script>
  <script src="js/lbar.js?v=44"></script>
  <script src="js/theme.js?v=44"></script>
  <script src="js/map.js?v=44"></script>
  <script src="js/store.js?v=44"></script>
  <script src="js/sync-client.js?v=44"></script>
  <script src="lib/html2canvas.min.js"></script>
  <script src="data/countries.js"></script>
  <script src="data/flags.js"></script>
  <script src="js/ui.js?v=44"></script>
  <script src="js/draw.js?v=44"></script>
  <script src="js/app.js?v=44"></script>
  <script src="js/map-style.js?v=44"></script>
  <script src="js/locator.js?v=44"></script>
  <script src="js/scene-inspector.js?v=44"></script>
  <script src="js/geocode.js?v=44"></script>
  <script src="js/campath.js?v=44"></script>
  <script src="data/ports.js"></script>
  <script src="lib/searoute.min.js"></script>
  <script src="js/ports-lookup.js?v=44"></script>
  <script src="js/tracking.js?v=44"></script>
  <script src="js/overlays.js?v=44"></script>
  <script src="js/map3d.js?v=44"></script>
  <script src="lib/three.min.js" defer></script>
  <script src="lib/GLTFLoader.js" defer></script>
  <script src="lib/DRACOLoader.js" defer></script>
  <script src="data/models3d-catalog.js"></script>
  <script src="js/assets3d.js?v=44"></script>
  <script src="js/models3d.js?v=44" defer></script>
  <script src="js/models-anim.js?v=44" defer></script>
  <script src="js/follow.js?v=44"></script>
  <script src="js/tracking3d.js?v=44" defer></script>
  <script src="js/timeline.js?v=44"></script>
  <script src="js/fx.js?v=44"></script>
  <script src="js/seafx.js?v=44"></script>
  <script src="js/daynight.js?v=44"></script>
  <script src="js/chrome.js?v=44"></script>
  <script src="js/qbar.js?v=44"></script>
  <script src="js/movable.js?v=44"></script>
  <script src="js/config-apply.js?v=44"></script>
  <script>/* fade the boot veil once modules have applied the saved config */
    (function(){var v=document.getElementById('boot');if(!v)return;var fade=function(){v.classList.add('gone');setTimeout(function(){if(v.parentNode)v.remove();},500);};
      requestAnimationFrame(function(){setTimeout(fade,650);});setTimeout(fade,3500);})();</script>
</body>
</html>
