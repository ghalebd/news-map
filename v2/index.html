<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Al Jazeera — News Map (v2)</title>
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../lib/leaflet.min.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <!-- liquid-glass refraction filter (used by panels via backdrop-filter) -->
  <svg style="position:absolute;width:0;height:0" aria-hidden="true">
    <filter id="glassDistort" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.016" numOctaves="2" seed="11" result="n"/>
      <feGaussianBlur in="n" stdDeviation="0.5" result="nb"/>
      <feDisplacementMap id="glassDisp" in="SourceGraphic" in2="nb" scale="46" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>
  <div id="map"></div>

  <script src="../lib/leaflet.min.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/dock.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/map.js"></script>
  <script src="js/store.js"></script>
  <script src="lib/html2canvas.min.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/draw.js"></script>
  <script src="js/app.js"></script>
  <script src="js/map-style.js"></script>
  <script src="js/locator.js"></script>
  <script src="js/scene-inspector.js"></script>
  <script src="data/ports.js"></script>
  <script src="lib/searoute.min.js"></script>
  <script src="js/ports-lookup.js"></script>
  <script src="js/tracking.js"></script>
  <script src="js/config-apply.js"></script>
</body>
</html>
