<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <!-- never let the browser serve a stale cached HTML entry (which would load old ?v JS and flash
       an old version / revert styles via pre-authoritative sync); always revalidate the page -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Al Jazeera — News Map · Control</title>
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../lib/leaflet.min.css">
  <link rel="stylesheet" href="lib/maplibre-gl.css">
  <link rel="stylesheet" href="css/tokens.css?v=57">
  <link rel="stylesheet" href="css/app.css?v=57">
  <link rel="stylesheet" href="css/control.css?v=57">
  <style>/* boot veil — hides the default→saved style/view swap on load (no FOUC / "old version" flash) */
    #boot{position:fixed;inset:0;background:#0a0e16;z-index:100000;display:flex;align-items:center;justify-content:center;transition:opacity .4s ease}
    #boot.gone{opacity:0;pointer-events:none}
    #boot::after{content:'';width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,.16);border-top-color:rgba(255,255,255,.7);animation:bootspin .8s linear infinite}
    @keyframes bootspin{to{transform:rotate(360deg)}}</style>
</head>
<body>
  <div id="boot" aria-hidden="true"></div>
  <svg style="position:absolute;width:0;height:0" aria-hidden="true">
    <filter id="glassDistort" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.016" numOctaves="2" seed="11" result="n"/>
      <feGaussianBlur in="n" stdDeviation="0.5" result="nb"/>
      <feDisplacementMap id="glassDisp" in="SourceGraphic" in2="nb" scale="46" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>
  <div id="map"></div>

  <script>window.APP_ROLE = 'control';</script>
  <script src="../lib/leaflet.min.js"></script>
  <script src="lib/maplibre-gl.min.js"></script>
  <script src="js/icons.js?v=57"></script>
  <script src="js/help.js?v=57"></script>
  <script src="js/lbar.js?v=57"></script>
  <script src="js/theme.js?v=57"></script>
  <script src="js/map.js?v=57"></script>
  <script src="js/store.js?v=57"></script>
  <script src="js/sync-client.js?v=57"></script>
  <script src="lib/html2canvas.min.js"></script>
  <script src="data/countries.js"></script>
  <script src="data/flags.js"></script>
  <script src="js/ui.js?v=57"></script>
  <script src="js/draw.js?v=57"></script>
  <script src="js/app.js?v=57"></script>
  <script src="js/map-style.js?v=57"></script>
  <script src="js/locator.js?v=57"></script>
  <script src="js/scene-inspector.js?v=57"></script>
  <script src="js/geocode.js?v=57"></script>
  <script src="js/campath.js?v=57"></script>
  <script src="data/ports.js"></script>
  <script src="lib/searoute.min.js"></script>
  <script src="js/ports-lookup.js?v=57"></script>
  <script src="js/tracking.js?v=57"></script>
  <script src="js/overlays.js?v=57"></script>
  <script src="js/map3d.js?v=57"></script>
  <script src="lib/three.min.js" defer></script>
  <script src="lib/GLTFLoader.js" defer></script>
  <script src="lib/DRACOLoader.js" defer></script>
  <script src="data/models3d-catalog.js"></script>
  <script src="js/assets3d.js?v=57"></script>
  <script src="js/models3d.js?v=57" defer></script>
  <script src="js/models-anim.js?v=57" defer></script>
  <script src="js/follow.js?v=57"></script>
  <script src="js/tracking3d.js?v=57" defer></script>
  <script src="js/model-control.js?v=57"></script>
  <script src="js/timeline.js?v=57"></script>
  <script src="js/fx.js?v=57"></script>
  <script src="js/seafx.js?v=57"></script>
  <script src="js/daynight.js?v=57"></script>
  <script src="js/chrome.js?v=57"></script>
  <script src="js/qbar.js?v=57"></script>
  <script src="js/movable.js?v=57"></script>
  <script src="js/config-apply.js?v=57"></script>
  <script src="js/config-panel.js?v=57"></script>
  <script>/* all modules have run + applied the saved config; fade the boot veil */
    (function(){var v=document.getElementById('boot');if(!v)return;var fade=function(){v.classList.add('gone');setTimeout(function(){if(v.parentNode)v.remove();},500);};
      requestAnimationFrame(function(){setTimeout(fade,650);});setTimeout(fade,3500);})();</script>
</body>
</html>
