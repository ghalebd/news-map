    <!-- Cockpit -->
    <ellipse cx="32" cy="14" rx="2.8" ry="3" fill="#3a4a5e"/>
    <!-- Engines -->
    <ellipse cx="20" cy="32" rx="2" ry="3" fill="#888"/>
    <ellipse cx="44" cy="32" rx="2" ry="3" fill="#888"/>
