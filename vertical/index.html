// ===== Build plane icon HTML based on aircraft type =====
function pickPlaneImage(type) {
  // Type codes from airplanes.live (e.g. "A320", "B737", "B77W", "GLEX", "C172")
  if (!type) return '../live_assets/plane_airliner.png';
  type = type.toUpperCase();
  // Wide-body & heavy → passenger airplane image (4-engine look)
  if (/^(B74|B77|B78|A33|A34|A35|A38|MD11|IL96)/.test(type)) return '../live_assets/plane_passenger.png';
  // Boeing 757 specifically
  if (/^B75/.test(type)) return '../live_assets/plane_boeing.png';
  // Private jets / regional / small types
  if (/^(GLF|GL|FA|CL|CRJ|GLEX|G\d|LJ|HA|H25|F\d|E13|E14|E17|BE|C\d|PC|TBM|CITAT)/.test(type)) return '../live_assets/plane_jet.png';
  // Default: single-aisle airliner
  return '../live_assets/plane_airliner.png';
}

function buildPlaneIconHtml(info) {
  const img = pickPlaneImage(info.aircraftType || info.country);
  const heading = info.heading || 0;
  // Outer container does NOT rotate — only the plane image inside rotates.
  // The shadow stays at fixed offset (down-right) regardless of plane heading.
  return `<div class="plane-wrap">
    <div class="plane-shadow" style="--rot:${heading}deg"><img src="${img}" draggable="false"/></div>
    <div class="plane-marker" style="--rot:${heading}deg"><img src="${img}" draggable="false"/></div>
  </div>`;
}

// === LIVE FLIGHTS via OpenSky Network (free, global, no API key) ===
window.liveFlights = {
  enabled: false,
  flights: new Map(),
  layerGroup: null,
  fetchTimer: null,
  
  toggle(on) {
    const btn = document.getElementById('flightsToggleBtn');
    const status = document.getElementById('flightsStatus');
    if (on === undefined) on = !this.enabled;
    this.enabled = on;
    if (btn) btn.classList.toggle('active', on);
    if (on) {
      if (!this.layerGroup) this.layerGroup = L.layerGroup().addTo(map);
      else this.layerGroup.addTo(map);
      if (status) { status.textContent = 'LIVE'; status.className = 'ais-status live'; }
      this.fetchOnce();
      this.fetchTimer = setInterval(() => this.fetchOnce(), 10000); // every 10s
      showToast('✈️ Live flight tracking enabled', 2000);
    } else {
      if (status) { status.textContent = 'OFF'; status.className = 'ais-status off'; }
      clearInterval(this.fetchTimer);
      if (this.layerGroup) map.removeLayer(this.layerGroup);
      this.flights.clear();
      this.updateCount();
    }
  },
  
  async fetchOnce() {
    if (!this.enabled || !map) return;
    const b = map.getBounds();
    const lamin = b.getSouth().toFixed(3);
    const lamax = b.getNorth().toFixed(3);
    const lomin = b.getWest().toFixed(3);
    const lomax = b.getEast().toFixed(3);
    const center = map.getCenter();
    const corner = L.latLng(b.getNorth(), b.getEast());
    const distNM = Math.min(Math.max(50, center.distanceTo(corner) / 1852), 1000);

    // Multi-source fallback (iPad-friendly)
    const sources = [
      // Primary: airplanes.live (CORS-friendly, fast on Safari/iPad)
      {
        url: `https://api.airplanes.live/v2/point/${center.lat.toFixed(2)}/${center.lng.toFixed(2)}/${Math.round(distNM)}`,
        parse: (data) => {
          const ac = data.ac || data.aircraft || [];
          return ac.filter(a => a.lat != null && a.lon != null).map(a => ({
            icao: a.hex, callsign: (a.flight || a.r || '').trim(), country: a.t || '',
            lat: a.lat, lng: a.lon, alt: a.alt_baro || a.alt_geom || 0,
            velocity: (a.gs || 0) * 0.5144, heading: a.track || a.true_heading || 0,
            aircraftType: a.t || '', registration: a.r || ''
          }));
        }
      },
      // Fallback: OpenSky via codetabs proxy
      {
        url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(`https://opensky-network.org/api/states/all?lamin=${lamin}&lomin=${lomin}&lamax=${lamax}&lomax=${lomax}`)}`,
        parse: (data) => {
          const states = data.states || [];
          return states.filter(s => s[6] != null && s[5] != null && !s[8]).map(s => ({
            icao: s[0], callsign: (s[1]||'').trim(), country: s[2],
            lat: s[6], lng: s[5], alt: (s[7]||0) * 3.281,
            velocity: s[9] || 0, heading: s[10] || 0,
            aircraftType: '', registration: ''
          }));
        }
      }
    ];

    let aircraft = null;
    for (const source of sources) {
      try {
        const r = await fetch(source.url, { signal: AbortSignal.timeout(8000) });
        if (!r.ok) continue;
        const data = await r.json();
        aircraft = source.parse(data);
        if (aircraft && aircraft.length >= 0) break;
      } catch (e) {
        console.warn('Flight source failed:', e.message);
      }
    }

    if (!aircraft) {
      if (this.flights.size === 0 && (this._errorCount = (this._errorCount || 0) + 1) === 2) {
        showToast('Flight data unavailable — please retry', 3000);
      }
      return;
    }
    this._errorCount = 0;

    if (aircraft.length === 0) {
      if (this.flights.size === 0 && (this._emptyCount = (this._emptyCount || 0) + 1) === 2) {
        showToast('No aircraft visible in this area', 3000);
      }
      return;
    }
    this._emptyCount = 0;

    const seen = new Set();
    const bounds = map.getBounds();
    aircraft.forEach(a => {
      if (!bounds.contains([a.lat, a.lng])) return;
      seen.add(a.icao);
      this.upsertFlight(a.icao, a);
    });
    this.flights.forEach((f, icao) => {
      if (!seen.has(icao)) {
        if (f.marker && this.layerGroup) this.layerGroup.removeLayer(f.marker);
        this.flights.delete(icao);
      }
    });
    this.updateCount();
  },
  
  upsertFlight(icao, info) {
    let f = this.flights.get(icao);
    if (!f) {
      f = { icao, ...info };
      const html = buildPlaneIconHtml(info);
      f.marker = L.marker([info.lat, info.lng], {
        icon: L.divIcon({
          html, className: 'flight-marker', iconSize: [56, 56], iconAnchor: [28, 28]
        }),
        zIndexOffset: 200, keyboard: false
      });
      const tooltip = `<b>${info.callsign || info.registration || 'Unknown'}</b><br>Type: ${info.aircraftType || '?'}${info.registration ? ' (' + info.registration + ')' : ''}<br>Alt: ${Math.round(info.alt)}ft | Speed: ${Math.round(info.velocity*1.94)}kt`;
      f.marker.bindTooltip(tooltip, { direction: 'top', offset: [0,-10], sticky: true, className: 'marker-label-tooltip' });
      if (this.layerGroup) f.marker.addTo(this.layerGroup);
      this.flights.set(icao, f);
    } else {
      Object.assign(f, info);
      if (f.marker) {
        f.marker.setLatLng([info.lat, info.lng]);
        f.marker.setIcon(L.divIcon({
          html: buildPlaneIconHtml(info),
          className: 'flight-marker', iconSize: [56, 56], iconAnchor: [28, 28]
        }));
        const tooltip = `<b>${info.callsign || info.registration || 'Unknown'}</b><br>Type: ${info.aircraftType || '?'}${info.registration ? ' (' + info.registration + ')' : ''}<br>Alt: ${Math.round(info.alt)}ft | Speed: ${Math.round(info.velocity*1.94)}kt`;
        f.marker.setTooltipContent(tooltip);
      }
    }
  },
  
  updateCount() {
    const c = document.getElementById('flightsCount');
    if (c) {
      c.textContent = this.flights.size;
      c.style.display = this.flights.size > 0 ? 'inline-block' : 'none';
    }
  }
};

// DRAGGABLE PANELS — drag any panel by its title bar
// =====================================================================
(function() {
  const draggablePanels = [
    { selector: '.toolbar', handle: null /* whole panel, only when not over a button */ },
    { selector: '.layers-panel', handle: '.layers-title' },
    { selector: '.labels-panel', handle: '.labels-title' },
    { selector: '.storyboard-panel', handle: '.storyboard-header' }
  ];
  
  function makeDraggable(el, handleSelector) {
    if (!el || el.dataset.draggable === '1') return;
    el.dataset.draggable = '1';
    
    const handle = handleSelector ? el.querySelector(handleSelector) : el;
    if (!handle) return;
    handle.style.cursor = 'move';
    
    let startX = 0, startY = 0;
    let panelStartLeft = 0, panelStartTop = 0;
    let dragging = false;
    
    handle.addEventListener('pointerdown', (e) => {
      // Don't drag if clicking on a button/input inside
      if (e.target.closest('button, input, .layer-btn, .label-toggle, .tool-btn, .color-circle, .panel-collapse-btn, .storyboard-btn')) return;
      // Don't drag if collapsed (let click-to-expand work)
      if (el.classList.contains('is-collapsed')) return;
      
      dragging = true;
      el.classList.add('is-dragging');
      const r = el.getBoundingClientRect();
      panelStartLeft = r.left;
      panelStartTop = r.top;
      startX = e.clientX;
      startY = e.clientY;
      
      // Switch to absolute pixel positioning to allow free placement
      el.style.left = panelStartLeft + 'px';
      el.style.top = panelStartTop + 'px';
      el.style.right = 'auto';
      el.style.bottom = 'auto';
      el.style.transform = 'none';
      
      handle.setPointerCapture(e.pointerId);
      e.preventDefault();
    });
    
    let rafPending = false;
    let lastEvent = null;
    handle.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      lastEvent = e;
      if (rafPending) return;
      rafPending = true;
      requestAnimationFrame(() => {
        rafPending = false;
        if (!dragging || !lastEvent) return;
        const dx = lastEvent.clientX - startX;
        const dy = lastEvent.clientY - startY;
        const newLeft = panelStartLeft + dx;
        const newTop = panelStartTop + dy;
        const maxLeft = window.innerWidth - el.offsetWidth - 4;
        const maxTop = window.innerHeight - el.offsetHeight - 4;
        el.style.left = Math.max(4, Math.min(maxLeft, newLeft)) + 'px';
        el.style.top = Math.max(4, Math.min(maxTop, newTop)) + 'px';
      });
    });
    
    handle.addEventListener('pointerup', (e) => {
      dragging = false;
      el.classList.remove('is-dragging');
      handle.releasePointerCapture(e.pointerId);
      // Save position
      try {
        const r = el.getBoundingClientRect();
        localStorage.setItem('panel_pos_' + (el.id || el.className.split(' ')[0]),
          JSON.stringify({ left: r.left, top: r.top }));
      } catch {}
    });
  }
  
  function restorePositions() {
    draggablePanels.forEach(({ selector, handle }) => {
      document.querySelectorAll(selector).forEach(el => {
        makeDraggable(el, handle);
        try {
          const id = el.id || el.className.split(' ')[0];
          const saved = JSON.parse(localStorage.getItem('panel_pos_' + id) || 'null');
          if (saved && saved.left != null) {
            el.style.left = saved.left + 'px';
            el.style.top = saved.top + 'px';
            el.style.right = 'auto';
            el.style.bottom = 'auto';
            el.style.transform = 'none';
          }
        } catch {}
      });
    });
  }
  
  // Run after DOM ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', restorePositions);
  } else {
    restorePositions();
  }
})();

// ZOOM-AWARE ASSET SIZING — markers scale with map zoom
// =============================================================
(function() {
  if (!window.map) return;
  
  // Calculate scale factor based on zoom level
  // At zoom 5: scale=0.6, zoom 10: scale=1.0, zoom 15: scale=1.6
  function zoomScale() {
    const z = map.getZoom();
    return Math.max(0.5, Math.min(1.8, 0.4 + (z - 3) * 0.12));
  }
  
  function applyZoomScale() {
    const scale = zoomScale();
    document.documentElement.style.setProperty('--zoom-scale', scale);
  }
  
  map.on('zoomend', applyZoomScale);
  applyZoomScale();
})();



// Re-render city labels when zoom changes (uses labelLayers.cities)
(function() {
  if (!window.map) return;

    clearTimeout(zoomDebounceTimer);
    zoomDebounceTimer = setTimeout(() => {
      // Only rebuild if cities is currently shown
      if (typeof labelStates !== 'undefined' && labelStates.cities && typeof labelLayers !== 'undefined' && labelLayers.cities) {

          map.removeLayer(labelLayers.cities);

            labelLayers.cities = newLayer;
            newLayer.addTo(map);
          }
        } catch (e) { console.warn('Cities rebuild failed:', e); }
      }
    }, 350);
  });
})();

<script>
// ===== Touch Mode JS — pinch zoom, double-tap, asset drag-drop =====
(function() {
  function isTouch() { return document.body.classList.contains('touch-mode'); }
  
  // === PINCH ZOOM ===
  let pinchInitial = null;
  function setupPinch() {
    if (typeof map === 'undefined' || !map) { setTimeout(setupPinch, 500); return; }
    const cont = map.getContainer();
    
    cont.addEventListener('touchstart', function(e) {
      if (!isTouch() || e.touches.length !== 2) return;
      e.preventDefault();
      const t1 = e.touches[0], t2 = e.touches[1];
      const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
      const cx = (t1.clientX + t2.clientX) / 2, cy = (t1.clientY + t2.clientY) / 2;
      const rect = cont.getBoundingClientRect();
      pinchInitial = {
        dist: dist,
        zoom: map.getZoom(),
        center: map.containerPointToLatLng([cx - rect.left, cy - rect.top])
      };
    }, { passive: false });
    
    cont.addEventListener('touchmove', function(e) {
      if (!isTouch() || !pinchInitial || e.touches.length !== 2) return;
      e.preventDefault();
      const t1 = e.touches[0], t2 = e.touches[1];
      const newDist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
      const scale = newDist / pinchInitial.dist;
      const newZoom = Math.max(1, Math.min(18, pinchInitial.zoom + Math.log2(scale)));
      map.setZoomAround(pinchInitial.center, newZoom, { animate: false });
    }, { passive: false });
    
    cont.addEventListener('touchend', function(e) {
      if (e.touches.length < 2) pinchInitial = null;
    }, { passive: true });
    
    console.log('Pinch zoom enabled');
  }
  setupPinch();
  
  // === ASSET DRAG-AND-DROP ===
  let drag = null;
  document.addEventListener('touchstart', function(e) {
    if (!isTouch() || e.touches.length !== 1) return;
    const btn = e.target.closest('.asset-btn');
    if (!btn || !btn.dataset.asset) return;
    
    const t = e.touches[0];
    const ghost = document.createElement('div');
    ghost.style.cssText = 'position:fixed;z-index:99999;width:64px;height:64px;left:' + (t.clientX-32) + 'px;top:' + (t.clientY-32) + 'px;background:rgba(0,184,212,0.3);border:2px dashed #00b8d4;border-radius:8px;display:flex;align-items:center;justify-content:center;pointer-events:none;';
    const img = btn.querySelector('img');
    if (img) {
      const i = img.cloneNode(true);
      i.style.cssText = 'width:48px;height:48px;object-fit:contain;';
      ghost.appendChild(i);
    }
    document.body.appendChild(ghost);
    drag = { type: btn.dataset.asset, ghost: ghost };
  }, { passive: false, capture: true });
  
  document.addEventListener('touchmove', function(e) {
    if (!drag || e.touches.length !== 1) return;
    const t = e.touches[0];
    drag.ghost.style.left = (t.clientX - 32) + 'px';
    drag.ghost.style.top = (t.clientY - 32) + 'px';
    e.preventDefault();
  }, { passive: false, capture: true });
  
  document.addEventListener('touchend', function(e) {
    if (!drag) return;
    const t = e.changedTouches[0];
    if (t && typeof map !== 'undefined' && map) {
      drag.ghost.style.display = 'none';
      const target = document.elementFromPoint(t.clientX, t.clientY);
      if (target && (target.id === 'map' || target.closest('#map'))) {
        try {
          const rect = map.getContainer().getBoundingClientRect();
          const ll = map.containerPointToLatLng([t.clientX - rect.left, t.clientY - rect.top]);
          if (typeof window.placeAsset === 'function') {
            window.placeAsset(ll, drag.type, 0);
          }
        } catch(err) { console.error(err); }
      }
    }
    if (drag.ghost.parentNode) drag.ghost.parentNode.removeChild(drag.ghost);
    drag = null;
  }, { passive: false, capture: true });
  
  console.log('Touch mode JS ready');
})();
</script>
